<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://kit.fontawesome.com/ae1002b89e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="dream_dashboard.css" />
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="dashboard-div">
                <h1 class="dashboard-heading">Dashboard</h1>
                <div class="dashboard-content">
                    <div class="icon-center">
                        <i class="fas fa-home icon"></i>
                    </div>
                    <p class="dashboard-names">Home</p>
                </div>
                <div class="dashboard-content">
                    <div class="icon-center">
                        <i class="fas fa-download icon"></i>
                    </div>
                    <p class="dashboard-names">Downloads</p>
                </div>
                <div class="dashboard-content favourites">
                    <div class="icon-center">
                        <i class="far fa-star icon"></i>
                    </div>
                    <p class="dashboard-names">Favourites</p>
                </div>
                <div class="dashboard-content">
                    <div class="icon-center">
                        <i class="fas fa-cog icon"></i>
                    </div>
                    <p class="dashboard-names">Settings</p>
                </div>
            </div>
            <div class="dashboard-content dashboard-div">
                <div class="icon-center">
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/user-profile-img.png" alt="" class="pfp" />
                </div>
                <p class="sarah">Sarah Meyers</p>
            </div>
        </div>
        <div class="main-content">
            <h1 class="main-heading">Favorites</h1>
            <div class="card-container">
                <h1 class="content-heading">Cars</h1>
                <div class="cards-align">
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/car-1-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/car-2-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/car-3-img.png" alt="" class="content-image" />
                </div>
            </div>
            <div class="card-container">
                <h1 class="content-heading">Bikes</h1>
                <div class="cards-align">
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-1-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-2-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/bike-3-img.png" alt="" class="content-image" />
                </div>
            </div>
            <div class="card-container">
                <h1 class="content-heading">Houses</h1>
                <div class="cards-align">
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/house-1-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/house-2-img.png" alt="" class="content-image" />
                    <img src="https://assets.ccbp.in/frontend/intermediate-rwd/house-3-img.png" alt="" class="content-image" />
                </div>
            </div>
        </div>
    </div>
</body>

</html>
